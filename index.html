<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<title>Remote KB</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a0f;
  --accent:#7fffb2;
  --accent2:#ff7f50;
  --surface:#111118;
  --surface2:#18181f;
  --border:#252535;
  --text:#d8d8e8;
  --muted:#44445a;
  --key-bg:#15151e;
  --key-shadow:#09090f;
  --key-fn:#1c1c28;
  --app-font:'Space Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;touch-action:manipulation;}
html,body{height:100%;overflow:hidden;}
body{
  background:var(--bg);
  color:var(--text);
  font-family:var(--app-font);
  display:flex;
  flex-direction:column;
  height:100dvh;
  user-select:none;
  -webkit-user-select:none;
}

/* ── TITLEBAR ── */
.titlebar{
  background:var(--surface);
  border-bottom:1px solid var(--border);
  padding:0 14px;
  height:40px;
  display:flex;
  align-items:center;
  gap:10px;
  flex-shrink:0;
}
.traffic{display:flex;gap:6px;align-items:center;}
.traffic span{
  width:11px;height:11px;border-radius:50%;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
}
.t-r{background:#ff5f57;} .t-y{background:#ffbd2e;} .t-g{background:#28c840;}
.bar-title{
  font-size:10px;color:var(--muted);
  letter-spacing:2px;flex:1;text-align:center;
}
.status{display:flex;align-items:center;gap:5px;font-size:9px;color:var(--muted);}
.dot{width:6px;height:6px;border-radius:50%;background:var(--muted);transition:all .4s;}
.dot.on{background:var(--accent);box-shadow:0 0 7px var(--accent);}

/* ── MAIN ── */
.main{
  flex:1;min-height:0;
  display:flex;flex-direction:column;
  padding:8px 10px;
  gap:7px;
  overflow:hidden;
}

.lbl{
  font-size:9px;color:var(--muted);
  text-transform:uppercase;letter-spacing:2px;
  margin-bottom:3px;
}

/* PC clipboard box */
.pc-section{flex-shrink:0;}
.pc-box{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:6px;
  padding:7px 10px;
  font-size:12px;font-family:inherit;
  color:var(--text);
  height:62px;
  overflow-y:auto;
  white-space:pre-wrap;word-break:break-all;
  transition:border-color .25s;
  line-height:1.5;
}
.pc-box.flash{border-color:var(--accent);}
.pc-placeholder{color:var(--muted);font-style:italic;font-size:11px;}

/* Draft area */
.draft-section{flex-shrink:0;}
.draft-row{display:flex;gap:6px;align-items:stretch;}
.draft-box{
  flex:1;
  background:var(--surface);
  border:1px solid var(--accent);
  border-radius:6px;
  padding:7px 10px;
  font-size:14px;font-family:inherit;
  color:var(--accent);
  min-height:42px;
  white-space:pre-wrap;word-break:break-all;
  line-height:1.5;
}
.draft-cursor{
  display:inline-block;
  width:2px;height:1em;
  background:var(--accent);
  vertical-align:text-bottom;
  margin-left:1px;
  animation:blink 1s step-end infinite;
}
.draft-pending{
  color:var(--accent2);
  text-decoration:underline;
  text-decoration-style:dotted;
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

.send-btn{
  background:var(--accent);
  color:var(--bg);
  border:none;border-radius:6px;
  padding:0 14px;
  font-family:inherit;font-size:11px;font-weight:700;
  letter-spacing:1px;
  cursor:pointer;flex-shrink:0;
  transition:filter .15s;
}
.send-btn:active{filter:brightness(.8);}

/* ── MODE BAR ── */
.mode-bar{
  display:flex;gap:5px;flex-shrink:0;
}
.mode-btn{
  flex:1;
  background:var(--key-fn);
  border:1px solid var(--border);
  border-radius:5px;
  color:var(--muted);
  font-family:inherit;font-size:11px;
  padding:6px 0;
  cursor:pointer;text-align:center;
  transition:all .15s;
}
.mode-btn.active{
  background:var(--accent2);
  color:var(--bg);
  border-color:var(--accent2);
  font-weight:700;
}

/* ── KEYBOARD ── */
.keyboard{
  display:flex;flex-direction:column;
  gap:5px;
  flex-shrink:0;
  padding-bottom:max(env(safe-area-inset-bottom),6px);
}
.kb-row{display:flex;gap:4px;justify-content:center;}

.key{
  background:var(--key-bg);
  border:1px solid var(--border);
  border-bottom:3px solid var(--key-shadow);
  border-radius:7px;
  color:var(--text);
  font-family:inherit;
  font-size:15px;
  font-weight:700;
  height:44px;
  flex:1;
  min-width:28px;
  max-width:36px;
  cursor:pointer;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:1px;
  transition:background .06s;
  position:relative;
}
.key.pressed,.key:active{
  background:#222235;
  border-bottom-width:1px;
  transform:translateY(2px);
}
.key-main{font-size:15px;line-height:1;}
.key-sub{font-size:8px;color:var(--accent);line-height:1;opacity:.9;}

/* Special key widths */
.key-fn{
  background:var(--key-fn);
  color:var(--muted);
  font-size:11px;
  max-width:52px;flex:1.4;
}
.key-shift{max-width:52px;flex:1.4;font-size:16px;color:var(--muted);}
.key-shift.on{color:var(--accent);border-color:var(--accent);}
.key-bs{max-width:52px;flex:1.4;font-size:16px;color:var(--accent2);}
.key-space{flex:5;max-width:180px;background:var(--key-fn);font-size:11px;color:var(--muted);letter-spacing:1px;}
.key-enter{flex:2;max-width:72px;font-size:15px;color:var(--accent);}
.key-mode{flex:1.4;max-width:52px;background:var(--key-fn);font-size:10px;color:var(--muted);}
</style>
</head>
<body>

<div class="titlebar">
  <div class="traffic">
    <span class="t-r"></span>
    <span class="t-y"></span>
    <span class="t-g"></span>
  </div>
  <div class="bar-title">REMOTE KB</div>
  <div class="status">
    <div class="dot" id="dot"></div>
    <span id="statusTxt">--</span>
  </div>
</div>

<div class="main">

  <div class="pc-section">
    <div class="lbl">PC Clipboard</div>
    <div class="pc-box" id="pcBox">
      <span class="pc-placeholder">waiting for PC...</span>
    </div>
  </div>

  <div class="draft-section">
    <div class="lbl">Draft</div>
    <div class="draft-row">
      <div class="draft-box" id="draftBox"></div>
      <button class="send-btn" id="sendBtn">SEND</button>
    </div>
  </div>

  <div class="mode-bar">
    <button class="mode-btn active" data-mode="en">EN</button>
    <button class="mode-btn" data-mode="jp">JP</button>
    <button class="mode-btn" data-mode="num">123</button>
  </div>

  <div class="keyboard" id="keyboard"></div>

</div>

<script>
// ─── CONFIG ───────────────────────────────────
const FB = 'https://key-board-ee542-default-rtdb.firebaseio.com/remote-kb';

// ─── STATE ────────────────────────────────────
let mode    = 'en';
let shifted = false;
let draft   = '';     // committed text
let pending = '';     // romaji buffer (JP mode)
let lastPcText = null;

// ─── ROMAJI TABLE ─────────────────────────────
const RT = {
  'a':'あ','i':'い','u':'う','e':'え','o':'お',
  'ka':'か','ki':'き','ku':'く','ke':'け','ko':'こ',
  'kya':'きゃ','kyi':'きぃ','kyu':'きゅ','kye':'きぇ','kyo':'きょ',
  'ga':'が','gi':'ぎ','gu':'ぐ','ge':'げ','go':'ご',
  'gya':'ぎゃ','gyu':'ぎゅ','gyo':'ぎょ',
  'sa':'さ','si':'し','su':'す','se':'せ','so':'そ',
  'shi':'し','sha':'しゃ','shu':'しゅ','she':'しぇ','sho':'しょ',
  'za':'ざ','zi':'じ','zu':'ず','ze':'ぜ','zo':'ぞ',
  'ja':'じゃ','ji':'じ','ju':'じゅ','je':'じぇ','jo':'じょ',
  'ta':'た','ti':'ち','tu':'つ','te':'て','to':'と',
  'chi':'ち','cha':'ちゃ','chu':'ちゅ','che':'ちぇ','cho':'ちょ',
  'tsu':'つ','tya':'ちゃ','tyu':'ちゅ','tyo':'ちょ',
  'da':'だ','di':'ぢ','du':'づ','de':'で','do':'ど',
  'na':'な','ni':'に','nu':'ぬ','ne':'ね','no':'の',
  'nya':'にゃ','nyu':'にゅ','nyo':'にょ',
  'ha':'は','hi':'ひ','hu':'ふ','he':'へ','ho':'ほ',
  'hya':'ひゃ','hyu':'ひゅ','hyo':'ひょ',
  'fu':'ふ','fa':'ふぁ','fi':'ふぃ','fe':'ふぇ','fo':'ふぉ',
  'ba':'ば','bi':'び','bu':'ぶ','be':'べ','bo':'ぼ',
  'bya':'びゃ','byu':'びゅ','byo':'びょ',
  'pa':'ぱ','pi':'ぴ','pu':'ぷ','pe':'ぺ','po':'ぽ',
  'pya':'ぴゃ','pyu':'ぴゅ','pyo':'ぴょ',
  'ma':'ま','mi':'み','mu':'む','me':'め','mo':'も',
  'mya':'みゃ','myu':'みゅ','myo':'みょ',
  'ya':'や','yu':'ゆ','yo':'よ',
  'ra':'ら','ri':'り','ru':'る','re':'れ','ro':'ろ',
  'rya':'りゃ','ryu':'りゅ','ryo':'りょ',
  'la':'ら','li':'り','lu':'る','le':'れ','lo':'ろ',
  'wa':'わ','wi':'うぃ','we':'うぇ','wo':'を',
  'n':'ん','nn':'ん',
  'xa':'ぁ','xi':'ぃ','xu':'ぅ','xe':'ぇ','xo':'ぉ',
  'xtu':'っ','xtsu':'っ','xya':'ゃ','xyu':'ゅ','xyo':'ょ',
  'wha':'うぁ','who':'うぉ',
  'va':'ゔぁ','vi':'ゔぃ','vu':'ゔ','ve':'ゔぇ','vo':'ゔぉ',
};

const RT_KEYS = Object.keys(RT);
function isPrefix(s){ return RT_KEYS.some(k => k.startsWith(s) && k.length > s.length); }

function processRomaji(ch){
  const buf = pending + ch;

  // Exact match
  if(RT[buf]){
    draft += RT[buf];
    pending = '';
    return;
  }

  // Still a valid prefix
  if(isPrefix(buf)){
    // 'n' + consonant that's not aiueony → emit ん, restart with ch
    if(pending === 'n' && !'aiueony'.includes(ch)){
      draft += 'ん';
      pending = ch;
      if(RT[ch]){ draft += RT[ch]; pending = ''; }
      return;
    }
    // double consonant → っ
    if(pending.length === 1 && pending === ch && !'aiueon'.includes(ch)){
      draft += 'っ';
      pending = ch;
      return;
    }
    pending = buf;
    return;
  }

  // No match — flush pending, restart
  if(pending){
    draft += (pending === 'n') ? 'ん' : pending;
    pending = '';
  }
  // Try ch alone
  if(RT[ch]){ draft += RT[ch]; }
  else if(isPrefix(ch)){ pending = ch; }
  else { draft += ch; }
}

function commitPending(){
  if(!pending) return;
  draft += (RT[pending] ?? (pending === 'n' ? 'ん' : pending));
  pending = '';
}

// ─── KEYBOARD LAYOUT ──────────────────────────
// JP hints (first kana for that consonant row)
const JP_HINT = {
  q:'く',w:'わ',e:'え',r:'ら',t:'た',y:'や',u:'う',i:'い',o:'お',p:'ぱ',
  a:'あ',s:'さ',d:'だ',f:'ふ',g:'が',h:'は',j:'じ',k:'か',l:'ら',
  z:'ざ',x:'ぁ',c:'ち',v:'ゔ',b:'ば',n:'な',m:'ま',
};

const ROWS_MAIN = [
  ['q','w','e','r','t','y','u','i','o','p'],
  ['a','s','d','f','g','h','j','k','l'],
  ['SH','z','x','c','v','b','n','m','BS'],
  ['MODE','SP','EN'],
];
const ROWS_NUM = [
  ['1','2','3','4','5','6','7','8','9','0'],
  ['-','/','.',',',':',';','!','?','@'],
  ['(',')','"',"'",'[',']','+','=','BS'],
  ['MODE','SP','EN'],
];

function buildKeyboard(){
  const kb = document.getElementById('keyboard');
  kb.innerHTML = '';
  const rows = (mode === 'num') ? ROWS_NUM : ROWS_MAIN;

  rows.forEach(row => {
    const rowEl = document.createElement('div');
    rowEl.className = 'kb-row';

    row.forEach(k => {
      const el = document.createElement('div');
      el.className = 'key';
      el.dataset.k = k;

      let main = k, sub = '', extraClass = '';

      switch(k){
        case 'SH':
          main = '⇧'; extraClass = 'key-shift' + (shifted?' on':'');
          break;
        case 'BS':
          main = '⌫'; extraClass = 'key-bs';
          break;
        case 'SP':
          main = 'SPACE'; extraClass = 'key-space';
          break;
        case 'EN':
          main = '↵'; extraClass = 'key-enter';
          break;
        case 'MODE':
          main = mode==='en'?'JP':mode==='jp'?'123':'EN';
          extraClass = 'key-mode key-fn';
          break;
        default:
          if(mode === 'jp') sub = JP_HINT[k] || '';
          if(shifted && mode !== 'num') main = k.toUpperCase();
      }

      el.className = 'key ' + extraClass;

      const ms = document.createElement('span');
      ms.className = 'key-main'; ms.textContent = main;
      el.appendChild(ms);
      if(sub){
        const ss = document.createElement('span');
        ss.className = 'key-sub'; ss.textContent = sub;
        el.appendChild(ss);
      }

      el.addEventListener('pointerdown', e => { e.preventDefault(); onKey(k); });
      rowEl.appendChild(el);
    });

    kb.appendChild(rowEl);
  });
}

// ─── KEY HANDLER ──────────────────────────────
function onKey(k){
  switch(k){
    case 'BS':
      if(pending){ pending = pending.slice(0,-1); }
      else if(draft){ draft = draft.slice(0,-1); }
      renderDraft();
      // Also send backspace action to PC
      fbPost({type:'backspace'});
      return;

    case 'SH':
      shifted = !shifted;
      buildKeyboard();
      return;

    case 'SP':
      if(mode==='jp') commitPending();
      draft += ' ';
      renderDraft();
      fbPost({type:'type_text',text:' '});
      return;

    case 'EN':
      if(mode==='jp') commitPending();
      if(draft){
        fbPost({type:'type_text',text:draft});
        draft = '';
        renderDraft();
      }
      return;

    case 'MODE': {
      const cycle = {en:'jp',jp:'num',num:'en'};
      mode = cycle[mode];
      document.querySelectorAll('.mode-btn').forEach(b =>
        b.classList.toggle('active', b.dataset.mode === mode)
      );
      pending = '';
      buildKeyboard();
      renderDraft();
      return;
    }
  }

  // Regular char
  let ch = k;
  if(shifted && mode !== 'num') ch = k.toUpperCase();
  if(shifted){ shifted = false; buildKeyboard(); }

  if(mode === 'jp'){
    processRomaji(ch.toLowerCase());
    renderDraft();
    // In JP mode, send on each committed kana (draft grew)
    // We only send in ENTER/SEND for JP to avoid partial commits
  } else {
    draft += ch;
    renderDraft();
    fbPost({type:'type_text',text:ch});
  }
}

// ─── RENDER ───────────────────────────────────
function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function renderDraft(){
  const el = document.getElementById('draftBox');
  let html = esc(draft);
  if(pending) html += `<span class="draft-pending">${esc(pending)}</span>`;
  html += '<span class="draft-cursor"></span>';
  el.innerHTML = html;
}

// ─── FIREBASE ─────────────────────────────────
async function fbPost(action){
  try{
    await fetch(`${FB}/from_phone.json`,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({...action, ts:Date.now()})
    });
  }catch(e){console.warn('fbPost',e);}
}

async function pollPcText(){
  try{
    const r = await fetch(`${FB}/pc_text.json`);
    const val = await r.json();
    if(val !== lastPcText){
      lastPcText = val;
      const box = document.getElementById('pcBox');
      if(val === null || val === ''){
        box.innerHTML = '<span class="pc-placeholder">empty clipboard</span>';
      } else {
        box.textContent = val;
        box.classList.add('flash');
        setTimeout(()=>box.classList.remove('flash'), 400);
      }
    }
    setStatus(true);
  }catch(e){
    setStatus(false);
  }
}

function setStatus(ok){
  document.getElementById('dot').classList.toggle('on', ok);
  document.getElementById('statusTxt').textContent = ok ? 'LIVE' : 'ERR';
}

// ─── SEND BUTTON ──────────────────────────────
document.getElementById('sendBtn').addEventListener('click', ()=>{
  if(mode==='jp') commitPending();
  if(draft){
    fbPost({type:'type_text',text:draft});
    draft=''; pending='';
    renderDraft();
  }
});

// ─── MODE BUTTONS ─────────────────────────────
document.querySelectorAll('.mode-btn').forEach(btn => {
  btn.addEventListener('click', ()=>{
    mode = btn.dataset.mode;
    document.querySelectorAll('.mode-btn').forEach(b =>
      b.classList.toggle('active', b === btn)
    );
    pending = '';
    buildKeyboard();
    renderDraft();
  });
});

// ─── INIT ─────────────────────────────────────
buildKeyboard();
renderDraft();
pollPcText();
setInterval(pollPcText, 500);
</script>
</body>
</html>
